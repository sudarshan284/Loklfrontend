# Lightweight nginx config for serving the React SPA on port 3000.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static asset caching — CRA fingerprints filenames so these are safe long-term
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every non-asset path returns index.html so React Router takes over
    location / {
        try_files $uri /index.html;
    }

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
